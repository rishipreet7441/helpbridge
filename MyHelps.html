<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Helps Dashboard</title>

<style>

/* BODY */
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fdfbff, #eef2ff);
  padding: 30px;
  color: #334155;
}

/* TITLE */
.title {
  font-size: 34px;
  font-weight: 600;
  color: #4f46e5;
}

/* STATS */
.stats {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.stat {
  flex: 1;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding: 18px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(99,102,241,0.08);
  transition: 0.3s;
}

.stat:hover {
  transform: translateY(-5px);
}

/* SEARCH */
.search {
  margin-top: 20px;
  padding: 12px;
  width: 350px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  background: white;
  transition: 0.3s;
}

.search:focus {
  outline: none;
  box-shadow: 0 0 10px rgba(99,102,241,0.2);
}

/* GRID */
.grid {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(350px,1fr));
  gap: 25px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  transition: 0.4s;
  border: 1px solid rgba(255,255,255,0.5);
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 50px rgba(99,102,241,0.15);
}

/* STATUS */
.status {
  position: absolute;
  top: 15px;
  right: 15px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  color: white;
}
.pending { background: #fbbf24; }
.progress { background: #60a5fa; }
.completed { background: #34d399; }

/* INFO */
.info {
  font-size: 14px;
  margin: 4px 0;
}

/* DESCRIPTION */
.desc {
  margin-top: 10px;
  font-size: 14px;
  color: #475569;
}

/* MAP */
.map {
  margin-top: 12px;
  height: 110px;
  border-radius: 12px;
  background: linear-gradient(135deg, #c7d2fe, #93c5fd);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #1e3a8a;
  font-weight: 500;
}

/* PROGRESS */
.progress-bar {
  height: 8px;
  background: #e2e8f0;
  border-radius: 10px;
  margin: 12px 0;
}

.progress-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg,#6366f1,#22d3ee);
}

/* BUTTONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#6366f1,#818cf8);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.call {
  background: linear-gradient(135deg,#34d399,#10b981);
}

.chat {
  background: linear-gradient(135deg,#38bdf8,#0ea5e9);
}

/* EXTRA */
.extra {
  max-height: 0;
  overflow: hidden;
  transition: 0.4s;
}

.card.active .extra {
  max-height: 300px;
}

/* TIMELINE */
.timeline {
  font-size: 13px;
  color: #64748b;
  margin-top: 10px;
}

/* ANIMATION */
.card {
  animation: fadeUp 0.6s ease forwards;
}

@keyframes fadeUp {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="title">🚑 My Helps Dashboard</div>

<div class="stats">
  <div class="stat">Total Helps<br><b>12</b></div>
  <div class="stat">In Progress<br><b>4</b></div>
  <div class="stat">Completed<br><b>8</b></div>
</div>

<input type="text" id="search" class="search" placeholder="Search helps...">

<div class="grid" id="grid"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

const grid = document.getElementById("grid");
const search = document.getElementById("search");

let allData = [];

function render(list){
  grid.innerHTML="";

  list.forEach((item,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = i*0.1+"s";

    card.innerHTML = `
      <span class="status ${item.status}">
        ${item.status.toUpperCase()}
      </span>

      <h3>${item.title}</h3>

      <div class="info">👤 ${item.user}</div>
      <div class="info">📍 ${item.location}</div>
      <div class="info">📞 ${item.phone}</div>

      <div class="desc">${item.description}</div>

      <div class="map">📍 Live Location Preview</div>

      <div class="progress-bar">
        <div class="progress-fill" style="width:${item.progress}%"></div>
      </div>

      <div class="actions">
        <button class="btn">View</button>
        <button class="btn call">Call</button>
        <button class="btn chat">Chat</button>
      </div>
    `;

    card.onclick = () => card.classList.toggle("active");

    grid.appendChild(card);
  });
}

async function loadData(){
  try{
    const res = await fetch("http://127.0.0.1:8000/my-helps");

    if(!res.ok) throw new Error("API not working");

    const data = await res.json();

    allData = data;
    render(allData);

  }catch(err){
    console.error("Error loading MyHelps:", err);
  }
}

search.addEventListener("input", ()=>{
  const val = search.value.toLowerCase();

  const filtered = allData.filter(d =>
    d.title.toLowerCase().includes(val) ||
    d.user.toLowerCase().includes(val) ||
    d.location.toLowerCase().includes(val)
  );

  render(filtered);
});

loadData();

});
</script>
</body>
</html>
