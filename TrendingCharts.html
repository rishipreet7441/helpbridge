<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Help Impact Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5f7ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    /* Top stat cards */
    .stats-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .stat-card {
      flex: 1;
      background: #ffffff;
      border-radius: 14px;
      padding: 12px 10px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
      border: 1px solid #eaedf5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }

    .stat-card.s1::before { background: #4f6ef7; }
    .stat-card.s2::before { background: #22c55e; }
    .stat-card.s3::before { background: #f59e0b; }
    .stat-card.s4::before { background: #ec4899; }

    .stat-emoji { font-size: 1.3rem; margin-top: 4px; }

    .stat-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a2340;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.6rem;
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .stat-sub {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 2px;
    }

    .stat-card.s1 .stat-sub { background: #eef2ff; color: #4f6ef7; }
    .stat-card.s2 .stat-sub { background: #f0fdf4; color: #22c55e; }
    .stat-card.s3 .stat-sub { background: #fffbeb; color: #f59e0b; }
    .stat-card.s4 .stat-sub { background: #fdf2f8; color: #ec4899; }

    /* Chart card */
    .card {
      background: #ffffff;
      border-radius: 22px;
      padding: 1.5rem 1.5rem 1.2rem;
      width: 100%;
      box-shadow: 0 6px 28px rgba(0,0,0,0.08);
      border: 1px solid #eaedf5;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 0.3rem;
    }

    .live-dot {
      width: 9px; height: 9px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(1.4); }
    }

    h2 {
      text-align: center;
      color: #1a2340;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .badge {
      display: block;
      width: fit-content;
      margin: 0 auto 1rem;
      background: #eef0ff;
      color: #4f6ef7;
      font-size: 0.63rem;
      font-weight: 600;
      border-radius: 20px;
      padding: 2px 12px;
    }

    .chart-wrap {
      width: 100%;
      height: 200px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 1rem;
      justify-content: center;
    }

    .pill {
      font-size: 0.63rem;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      color: #fff;
    }

    /* New action buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 1rem;
    }

    .action-btn {
      flex: 1;
      padding: 11px 10px;
      border: none;
      border-radius: 12px;
      font-size: 0.8rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.3px;
    }

    .btn-boost {
      background: #1a2340;
      color: #fff;
      box-shadow: 0 4px 14px rgba(26,35,64,0.25);
    }

    .btn-boost:hover {
      background: #2d3a5e;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(26,35,64,0.3);
    }

    .btn-clear {
      background: #fff;
      color: #f44336;
      border: 2px solid #fde8e8;
      box-shadow: 0 2px 8px rgba(244,67,54,0.08);
    }

    .btn-clear:hover {
      background: #fde8e8;
      transform: translateY(-2px);
    }

    /* Progress section */
    .progress-section {
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      padding: 14px 18px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
      border: 1px solid #eaedf5;
    }

    .progress-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #1a2340;
      margin-bottom: 10px;
    }

    .prog-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .prog-label {
      font-size: 0.63rem;
      color: #555;
      width: 70px;
      font-weight: 600;
    }

    .prog-bar-bg {
      flex: 1;
      background: #f0f0f5;
      border-radius: 10px;
      height: 7px;
      overflow: hidden;
    }

    .prog-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .prog-val {
      font-size: 0.63rem;
      color: #999;
      width: 28px;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Top Stats -->
  <div class="stats-row">
    <div class="stat-card s1">
      <div class="stat-emoji">📦</div>
      <div class="stat-value" id="totalHelp">157</div>
      <div class="stat-label">Aid Units</div>
      <div class="stat-sub">Total Sent</div>
    </div>
    <div class="stat-card s2">
      <div class="stat-emoji">🥇</div>
      <div class="stat-value" id="topCat">Disaster</div>
      <div class="stat-label">Leading</div>
      <div class="stat-sub">Most Impact</div>
    </div>
    <div class="stat-card s3">
      <div class="stat-emoji">⚡</div>
      <div class="stat-value" id="avgHelp">26</div>
      <div class="stat-label">Per Zone</div>
      <div class="stat-sub">Average</div>
    </div>
    <div class="stat-card s4">
      <div class="stat-emoji">🌐</div>
      <div class="stat-value">6</div>
      <div class="stat-label">Sectors</div>
      <div class="stat-sub">Active</div>
    </div>
  </div>

  <!-- Chart Card -->
  <div class="card">
    <div class="card-header">
      <div class="live-dot"></div>
      <h2>Live Help Impact Dashboard</h2>
    </div>
    <span class="badge">Updated in real-time</span>

    <div class="chart-wrap">
      <canvas id="myChart"></canvas>
    </div>

    <div class="pills">
      <span class="pill" style="background:#4caf50">Food</span>
      <span class="pill" style="background:#2196f3">Medical</span>
      <span class="pill" style="background:#9c27b0">Education</span>
      <span class="pill" style="background:#ff9800">Assistance</span>
      <span class="pill" style="background:#f44336">Others</span>
      <span class="pill" style="background:#3b4fcf">Disaster</span>
    </div>

    <div class="btn-row">
      <button class="action-btn btn-boost" onclick="increaseHelp()">
        🚀 Boost All
      </button>
      <button class="action-btn btn-clear" onclick="resetHelp()">
        🗑 Clear Data
      </button>
    </div>
  </div>

  <!-- Progress Bars -->
  <div class="progress-section">
    <div class="progress-title">📈 Category Progress (out of 100)</div>
    <div id="progressBars"></div>
  </div>

</div>

<script>
const labels = ['Food','Medical','Education','Assistance','Others','Disaster'];
const colors = ['#4caf50','#2196f3','#9c27b0','#ff9800','#f44336','#3b4fcf'];
let data = [];

async function loadChart() {
  const res = await fetch("http://127.0.0.1:8000/chart-data");
  const d = await res.json();

  data = [d.food,d.medical,d.education,d.assistance,d.others,d.disaster];

  myChart.data.datasets[0].data = data;
  myChart.update();

  buildProgressBars();
  updateStats();
}

async function increaseHelp() {
  await fetch("http://127.0.0.1:8000/boost-chart",{method:"POST"});
  loadChart();
}

async function resetHelp() {
  await fetch("http://127.0.0.1:8000/reset-chart",{method:"POST"});
  loadChart();
}

function buildProgressBars() {
  const container = document.getElementById('progressBars');
  container.innerHTML = '';
  data.forEach((val,i)=>{
    container.innerHTML += `
      <div class="prog-row">
        <div class="prog-label">${labels[i]}</div>
        <div class="prog-bar-bg">
          <div class="prog-bar-fill" style="width:${val}%;background:${colors[i]}"></div>
        </div>
        <div class="prog-val">${val}</div>
      </div>`;
  });
}

function updateStats() {
  const total = data.reduce((a,b)=>a+b,0);
  const max = Math.max(...data);
  const topIdx = data.indexOf(max);

  document.getElementById('totalHelp').textContent = total;
  document.getElementById('topCat').textContent = labels[topIdx];
  document.getElementById('avgHelp').textContent = Math.round(total/labels.length);
}

const ctx = document.getElementById('myChart').getContext('2d');

const myChart = new Chart(ctx,{
  type:'bar',
  data:{
    labels:labels,
    datasets:[{
      data:[0,0,0,0,0,0],
      backgroundColor:colors,
      borderRadius:6,
      barThickness:22
    }]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{grid:{display:false}},
      y:{beginAtZero:true,max:100}
    }
  }
});

loadChart();
</script>
</body>
</html>
