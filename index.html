<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HelpBridge Auth</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="auth-box">

      <div class="toggle">
        <button id="loginBtn" class="active">Sign In</button>
        <button id="signupBtn">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <form id="loginForm" class="form active-form">
        <h2>Welcome Back 👋</h2>

        <input type="text" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>

        <!-- CAPTCHA -->
        <div class="captcha-box">
          <span id="captchaText"></span>
          <button type="button" id="refreshCaptcha">↻</button>
        </div>

        <input type="text" id="captchaInput" placeholder="Enter Captcha" required>

        <button type="submit">Sign In</button>

        <div class="divider">OR</div>

        <button type="button" class="google-btn">
          <img src="https://img.icons8.com/color/16/google-logo.png">
          Continue with Google
        </button>
      </form>

      <!-- SIGN UP -->
      <form id="signupForm" class="form">
        <h2>Create Account ✨</h2>

        <input type="text" id="signupName" placeholder="Full Name" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password" required>

        <button type="submit">Sign Up</button>
      </form>

    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="content">
      <h1>HelpBridge</h1>
      <h3>Connect. Support. Grow.</h3>

      <p>
        A platform that connects people in need with those who can help.
      </p>

      <div class="feature">🌐 Instant Help Access</div>
      <div class="feature">🤝 Community Support</div>
      <div class="feature">🔒 Safe & Secure</div>
    </div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const loginBtn = document.getElementById("loginBtn");
  const signupBtn = document.getElementById("signupBtn");
  const loginForm = document.getElementById("loginForm");
  const signupForm = document.getElementById("signupForm");

  const captchaText = document.getElementById("captchaText");
  const captchaInput = document.getElementById("captchaInput");
  const refreshCaptcha = document.getElementById("refreshCaptcha");

  // TOGGLE
  loginBtn.onclick = () => {
    loginForm.classList.add("active-form");
    signupForm.classList.remove("active-form");
    loginBtn.classList.add("active");
    signupBtn.classList.remove("active");
  };

  signupBtn.onclick = () => {
    signupForm.classList.add("active-form");
    loginForm.classList.remove("active-form");
    signupBtn.classList.add("active");
    loginBtn.classList.remove("active");
  };

  // CAPTCHA
  function generateCaptcha(){
    let chars = "ABCDEFG12345";
    let captcha = "";
    for(let i=0;i<5;i++){
      captcha += chars[Math.floor(Math.random()*chars.length)];
    }
    captchaText.innerText = captcha;
  }

  refreshCaptcha.onclick = generateCaptcha;
  generateCaptcha();

  // SIGNUP
  signupForm.addEventListener("submit", async function(e){
    e.preventDefault();

    try {
      const res = await fetch("https://helpbridge-backend-1-d3ui.onrender.com/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          name: document.getElementById("signupName").value,
          email: document.getElementById("signupEmail").value,
          password: document.getElementById("signupPassword").value
        })
      });

      const data = await res.json();
      alert(data.message);
    } catch(err){
      alert("Signup failed. Check backend.");
      console.error(err);
    }
  });

  // LOGIN
  loginForm.addEventListener("submit", async function(e){
    e.preventDefault();

    if(captchaInput.value !== captchaText.innerText){
      alert("Captcha incorrect!");
      generateCaptcha();
      return;
    }

    try {
      const res = await fetch("https://helpbridge-backend-1-d3ui.onrender.com/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email: document.getElementById("loginEmail").value,
          password: document.getElementById("loginPassword").value
        })
      });

      const data = await res.json();

      if(data.success){
        window.location.href = "home.html";
      } else {
        alert(data.message);
      }
    } catch(err){
      alert("Login failed. Check backend.");
      console.error(err);
    }
  });

});
</script>

</body>
</html>
