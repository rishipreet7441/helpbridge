<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Community</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e3f2fd, #fce4ec);
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #1976d2;
}

.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: #444;
}

.container {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap: 20px;
  padding: 20px;
}

.sidebar, .right-panel {
  background: rgba(255,255,255,0.5);
  padding: 20px;
  border-radius: 15px;
}

.post-box, .post {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

textarea {
  width: 100%;
  height: 70px;
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 10px;
}

.post-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

@media(max-width: 900px){
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">Community</div>
  <div class="nav-links">
    <a href="home.html">Home</a>
  </div>
</div>

<div class="container">

  <div class="sidebar">
    <h3>🔥 Trending</h3>
    <div>#EmergencyHelp</div>
    <div>#FloodRelief</div>
    <div>#BloodDonation</div>
  </div>

  <div>

    <div class="post-box">
      <textarea id="postInput" placeholder="Share something..."></textarea>
      <button class="post-btn" onclick="addPost()">Post</button>
    </div>

    <div id="posts">Loading...</div>

  </div>

  <div class="right-panel">
    <h3>🏆 Top Contributors</h3>
    <div>Ravi</div>
    <div>Sneha</div>
  </div>

</div>

<script>
const BASE_URL = "https://helpbridge-backend-1-d3ui.onrender.com";

// LOAD POSTS
async function loadPosts() {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "Loading...";

  try {
    const res = await fetch(`${BASE_URL}/get-posts`);
    const data = await res.json();

    postsDiv.innerHTML = "";

    if (!data.length) {
      postsDiv.innerHTML = "No posts yet.";
      return;
    }

    data.forEach(post => {
      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `
        <b>${post.username || "User"}</b><br>
        ${post.content || ""}
      `;

      postsDiv.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    postsDiv.innerHTML = "⚠️ Failed to load posts";
  }
}

// ADD POST
async function addPost() {
  const input = document.getElementById("postInput");
  const text = input.value.trim();

  if (text === "") {
    alert("Please write something before posting.");
    return;
  }

  try {
    await fetch(`${BASE_URL}/add-post`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        username: "You",
        role: "User",
        content: text
      })
    });

    input.value = "";
    loadPosts();

  } catch (err) {
    console.error(err);
    alert("Failed to post. Try again.");
  }
}

// INIT
loadPosts();
</script>

</body>
</html>
