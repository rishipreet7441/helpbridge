<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelpBridge | Need Help</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#eef4ff,#dce9ff);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .container{
      width:100%;
      max-width:900px;
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(15px);
      border-radius:30px;
      padding:40px;
      box-shadow:0 15px 40px rgba(0,0,0,0.12);
    }

    h1{
      text-align:center;
      color:#12326b;
      font-size:42px;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:#555;
      margin-bottom:35px;
      font-size:18px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .full{
      grid-column:1 / 3;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#12326b;
      font-weight:bold;
    }

    input, select, textarea{
      width:100%;
      padding:14px;
      border:1px solid #c9d7f2;
      border-radius:14px;
      outline:none;
      font-size:15px;
      background:#fff;
      transition:0.3s;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#2457d6;
      box-shadow:0 0 10px rgba(36,87,214,0.2);
    }

    textarea{
      resize:none;
      height:120px;
    }

    .btn{
      margin-top:30px;
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:#12326b;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#2457d6;
      transform:translateY(-3px);
    }

    .back{
      display:inline-block;
      margin-bottom:25px;
      text-decoration:none;
      color:#12326b;
      font-weight:bold;
    }

    @media(max-width:700px){
      .form-grid{
        grid-template-columns:1fr;
      }

      .full{
        grid-column:1;
      }

      h1{
        font-size:34px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="home.html" class="back">← Back to Home</a>

    <h1>Need Help?</h1>
    <p class="subtitle">Tell us what support you need and our volunteers will reach you.</p>

    <!-- ✅ Added form ID -->
    <form id="helpForm">
      <div class="form-grid">

        <div>
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div>
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="Enter your phone number">
        </div>

        <div>
          <label>City / Location</label>
          <input type="text" id="location" placeholder="Enter your location">
        </div>

        <div>
          <label>Type of Help Needed</label>
          <select id="help_type">
            <option>Food Support</option>
            <option>Medical Help</option>
            <option>Education</option>
            <option>Waste Management</option>
            <option>Emergency Assistance</option>
            <option>Disaster Relief</option>
            <option>Other</option>
          </select>
        </div>

        <div class="full">
          <label>Describe Your Situation</label>
          <textarea id="description" placeholder="Explain briefly what help you need..."></textarea>
        </div>

      </div>

      <button class="btn">Submit Request</button>
    </form>
  </div>

  <!-- ✅ Backend connection -->
  <script>
document.getElementById("helpForm").addEventListener("submit", async function(e){
  e.preventDefault();

  alert("Submitting request... Please wait ⏳");

  try {
    const res = await fetch("https://helpbridge-backend-1-d3ui.onrender.com/help-request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        location: document.getElementById("location").value,
        help_type: document.getElementById("help_type").value,
        description: document.getElementById("description").value
      })
    });

    const data = await res.json();
    alert(data.message || "Request submitted successfully!");

  } catch(error){
    alert("Failed to submit. Please try again.");
    console.error(error);
  }
});
</script>

</body>
</html>
